name: 매일 뉴스 수집 및 배포

# 언제 실행할지
on:
  # 1) 매일 한국시간 오전 8시 자동 실행
  #    cron은 UTC 기준이라 한국시간 8시 = UTC 23시 (전날)
  schedule:
    - cron: '0 23 * * *'

  # 2) 코드를 main 브랜치에 push할 때마다 즉시 실행
  push:
    branches: [main]

  # 3) GitHub 웹에서 수동 실행 버튼도 사용 가능
  workflow_dispatch:

# 실행 권한 설정 (GitHub Pages 배포용)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 코드 가져오기
      - name: Checkout repository
        uses: actions/checkout@v4

      # Python 환경 준비
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 패키지 설치
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 뉴스 수집 (실패해도 빌드는 계속 진행)
      - name: Collect news
        run: python collect.py
        continue-on-error: true

      # HTML 빌드
      - name: Build HTML
        run: python build.py

      # 수집된 데이터 자동 커밋 (변경사항 있을 때만)
      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ index.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M KST')"
          git push
        continue-on-error: true

      # GitHub Pages용 산출물 준비 (index.html + data 폴더)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  # 별도 job: Pages 배포
  deploy:
    needs: collect-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
